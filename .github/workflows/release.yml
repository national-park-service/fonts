name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PANTRY_REGISTRY_TOKEN: ${{ secrets.PANTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main

      - name: Read version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build fonts
        run: bun run build

      - name: Sanity-check fonts
        run: bun run check

      - name: Pack npm packages
        env:
          NPM_VERSION: ${{ steps.ver.outputs.version }}
        run: bun run pack:all

      - name: Build family ZIPs
        run: |
          mkdir -p dist
          for fam in nps-2026 redwood-serif campmate-script nps-symbols; do
            cd fonts && zip -r "../dist/nps-fonts-${fam}-${{ steps.ver.outputs.version }}.zip" "$fam" && cd ..
          done
          cd fonts && zip -r "../dist/nps-fonts-all-${{ steps.ver.outputs.version }}.zip" . && cd ..

      - name: Create GitHub Release
        uses: home-lang/pantry/packages/action@main
        with:
          install: 'false'
          release: 'true'
          release-files: |
            dist/*.zip
            OFL.txt
          release-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish packages to Pantry
        if: ${{ env.PANTRY_REGISTRY_TOKEN != '' || env.PANTRY_TOKEN != '' }}
        run: pantry publish:commit './packages/*'

      - name: Publish npm packages
        if: ${{ env.NPM_TOKEN != '' }}
        run: |
          for dir in packages/*/; do
            pkg=$(basename "$dir")
            echo "Publishing @nps-fonts/$pkg via Pantry"
            (cd "$dir" && pantry publish --npm --access public)
          done
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip npm publish
        if: ${{ env.NPM_TOKEN == '' }}
        run: echo "NPM_TOKEN is not configured; published Pantry commit packages and GitHub release only."
